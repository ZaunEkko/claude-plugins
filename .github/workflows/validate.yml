name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLAUDE_CODE_VERSION: "2.1.207"
  NODE_VERSION: "22.16.0"
  PYTHON_VERSION: "3.12.2"
  PYYAML_VERSION: "6.0.3"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify toolchain versions
        shell: bash
        run: |
          test "$(node --version)" = "v${NODE_VERSION}"
          test "$(python --version)" = "Python ${PYTHON_VERSION}"

      - name: Install pinned validation dependencies
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check "PyYAML==${PYYAML_VERSION}"
          npm install --global "@anthropic-ai/claude-code@${CLAUDE_CODE_VERSION}"
          test "$(claude --version)" = "${CLAUDE_CODE_VERSION} (Claude Code)"

      - name: Validate repository files
        run: python .github/validate-repository.py

      - name: Check shell syntax
        run: bash -n plugins/commit-commands/scripts/commit-with-dynamic-attribution.sh

      - name: Run complete Node test suite
        run: node --test plugins/commit-commands/tests/*.mjs plugins/ekko-image-gen/tests/*.mjs

      - name: Validate marketplace and active plugins
        shell: bash
        run: |
          claude plugin validate .
          claude plugin validate . --strict

          python - <<'PY' > "${RUNNER_TEMP}/active-plugin-sources.txt"
          import json
          from pathlib import Path

          catalog = json.loads(Path(".claude-plugin/marketplace.json").read_text(encoding="utf-8"))
          for plugin in catalog["plugins"]:
              source = plugin["source"]
              if not isinstance(source, str) or not source.startswith("./plugins/"):
                  raise SystemExit(f"invalid active plugin source: {source!r}")
              print(source)
          PY

          while IFS= read -r plugin_source; do
            claude plugin validate "${plugin_source}"
            claude plugin validate "${plugin_source}" --strict
          done < "${RUNNER_TEMP}/active-plugin-sources.txt"

  commit-commands-cross-platform:
    name: commit-commands (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify Node.js version
        shell: bash
        run: test "$(node --version)" = "v${NODE_VERSION}"

      - name: Run cross-platform commit-commands tests
        run: node --test plugins/commit-commands/tests/test_clean_gone.mjs plugins/commit-commands/tests/test_commit_push_pr_flow.mjs plugins/commit-commands/tests/test_commit_wrapper.mjs plugins/commit-commands/tests/test_direct_git_commit_guard.mjs
